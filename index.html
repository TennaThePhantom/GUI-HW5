<!doctype html>
<html lang="en" data-bs-theme="dark">
	<!--Make the website auto dark theme didn't know bootstrap even had this I know tailwind css has something like this but I didn't expect bootstrap to have it too-->
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Scrabble One-Line/HW5</title>

		<!--JQuery And Bootstrap links-->
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="https://code.jquery.com/ui/1.13.2/themes/dark-hive/jquery-ui.css"
		/>

		<link rel="stylesheet" href="css/style.css" />
	</head>
	<body>
		<!--scabble container-->
		<div class="container text-center">
			<h1 class="mb-4">Scrabble</h1>

			<!--Score Info-->
			<div class="row mb-4">
				<div class="col">
					<h3>
						Total Score:
						<span id="total-score" class="text-success">0</span>
					</h3>
					<h4>
						Current Word Score:
						<span id="current-score" class="text-warning">0</span>
					</h4>
				</div>
			</div>
			<!--scabble game-->
			<div id="scrabble-board"></div>
			<!--user tiles for game-->
			<div id="tile-rack"></div>
			<!--main Buttons for game-->
			<div class="mt-4">
				<button id="btn-submit" class="btn btn-success btn-lg me-2">
					Submit Word
				</button>
				<button id="btn-reset" class="btn btn-warning btn-lg me-2">
					Recall Tiles
				</button>
				<button id="btn-restart" class="btn btn-danger btn-lg">
					Restart Game
				</button>
			</div>
		</div>
		<!--Pop up for invalid move-->
		<div
			class="toast-container position-fixed bottom-0 end-0 p-3"
			style="z-index: 1055"
		>
			<div
				id="gameToast"
				class="toast text-bg-danger"
				role="alert"
				aria-live="assertive"
				aria-atomic="true"
			>
				<div class="toast-header text-bg-danger border-bottom border-dark">
					<strong class="me-auto">Invalid Move</strong>
					<button
						type="button"
						class="btn-close btn-close-white"
						data-bs-dismiss="toast"
						aria-label="Close"
					></button>
				</div>
				<div class="toast-body fw-bold" id="toastMessage"></div>
			</div>
		</div>

		<!--JQuery/Boostrap Script-->
		<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
		<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

		<script src="javascript\script.js"></script>
	</body>
</html>
